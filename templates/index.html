<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nemo IA | RedBlack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=20260313i" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <header class="site-header">
    <div>
      <h1>Nemo IA</h1>
      <p>Assistente tecnico com historico, chat e painel admin.</p>
    </div>
    <span class="badge">RedBlack</span>
  </header>

  <main>
        <section id="auth-section" class="auth-section">
      <div class="auth-card auth-card-center">
        <h2 class="auth-title">Login</h2>
        <div class="auth-tabs">
          <button id="btn-login-tab" class="auth-tab active" type="button">Login</button>
          <button id="btn-register-tab" class="auth-tab" type="button">Cadastro</button>
        </div>

        <form id="login-form" class="auth-form">
          <label for="login-user">Usuario</label>
          <input id="login-user" required minlength="3" placeholder="Usuario" />
          <label for="login-pass">Senha</label>
          <input id="login-pass" type="password" required minlength="8" placeholder="Senha" />
          <button type="submit" class="btn-primary">Entrar</button>
          <p class="auth-footer">Nao tem conta? <span id="goto-register">Crie agora</span></p>
        </form>

        <form id="register-form" class="auth-form hidden">
          <label for="reg-user">Novo usuario</label>
          <input id="reg-user" required minlength="3" maxlength="32" placeholder="Novo usuario" />
          <label for="reg-pass">Nova senha</label>
          <input id="reg-pass" type="password" required minlength="8" placeholder="Nova senha" />
          <button type="submit" class="btn-primary">Criar conta</button>
          <p class="auth-footer">Ja tem conta? <span id="goto-login">Entrar</span></p>
        </form>

        <p id="auth-message" class="message"></p>
      </div>
    </section>


    <section id="app-section" class="app-section hidden">
      <div class="app-topbar">
        <div>
          <h2>Nemo IA</h2>
          <p id="welcome-user"></p>
        </div>
        <button id="logout-btn" class="btn-ghost" type="button">Sair</button>
      </div>

      <div class="app-tabs">
        <button class="tab-btn active" data-tab="ai">Nemo IA</button>
        <button class="tab-btn" data-tab="chat">Conversas</button>
        <button class="tab-btn admin-only" data-tab="admin">Admin</button>
      </div>

      <section id="tab-ai" class="tab-panel active">
        <div class="ai-shell">
          <aside class="ai-sidebar">
            <div class="ai-actions">
              <button id="ai-new-chat-btn" class="btn-primary" type="button">Novo Chat</button>
              <button id="ai-refresh-btn" class="btn-ghost" type="button">Atualizar</button>
              <button id="ai-clear-btn" class="btn-ghost" type="button">Excluir chat</button>
            </div>
            <input id="ai-search" class="ai-search" placeholder="Buscar no historico" />
            <div id="ai-conversations" class="ai-history"></div>
          </aside>

          <section class="ai-main">
            <div id="ai-chat-stream" class="ai-stream"></div>
            <div id="ai-status" class="ai-status"></div>
            <div class="ai-composer">
              <input id="ai-question" placeholder="Pergunte algo" />
              <label class="file-btn" for="ai-image">
                <span class="file-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.44 11.05l-8.49 8.49a6 6 0 01-8.49-8.49l8.49-8.49a4 4 0 015.66 5.66l-8.49 8.49a2 2 0 01-2.83-2.83l7.78-7.78" />
                  </svg>
                </span>
                Selecionar arquivo
              </label>
              <input id="ai-image" type="file" accept="image/*" hidden />
              <button id="ai-ask-btn" class="btn-primary" type="button">Enviar</button>
            </div>
          </section>
        </div>
      </section>

      <section id="tab-chat" class="tab-panel">
        <div class="chat-shell">
          <aside class="chat-sidebar">
            <div class="chat-block">
              <h3>Conversas</h3>
              <input id="chat-search" class="chat-search" placeholder="Pesquisar ou iniciar conversa" />
              <div class="chat-filters">
                <button class="chip active" type="button">Tudo</button>
                <button class="chip" type="button">Nao lidas</button>
                <button class="chip" type="button">Favoritos</button>
              </div>
              <button id="chat-refresh-users" class="btn-ghost" type="button">Atualizar</button>
              <div id="chat-users" class="chat-list"></div>
            </div>
            <div class="chat-block">
              <h3>Grupos</h3>
              <input id="group-name" placeholder="Nome do grupo" />
              <div class="group-members">
                <div class="group-members-title">Selecione usuarios</div>
                <div id="group-members" class="group-members-list"></div>
              </div>
              <button id="group-create-btn" class="btn-primary" type="button">Criar grupo</button>
              <button id="group-refresh-btn" class="btn-ghost" type="button">Atualizar grupos</button>
              <div id="chat-groups" class="chat-list"></div>
            </div>
          </aside>

          <section class="chat-main">
            <div class="chat-header">
              <div class="chat-peer">
                <div id="chat-avatar" class="chat-avatar">?</div>
                <div>
                  <h3 id="chat-title">Selecione um usuario ou grupo</h3>
                  <div id="chat-typing" class="muted"></div>
                </div>
              </div>
              <div class="chat-actions-header">
                <button class="icon-btn" type="button" title="Buscar">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="7"/>
                    <path d="M21 21l-4.3-4.3"/>
                  </svg>
                </button>
                <button class="icon-btn" type="button" title="Mais">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
                  </svg>
                </button>
              </div>
            </div>
            <div id="chat-messages" class="chat-messages"></div>

            <div class="chat-composer">
              <div class="chat-input-row">
                <button class="icon-btn" id="emoji-btn" type="button" title="Emoji">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="9" />
                    <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                    <path d="M9 9h.01M15 9h.01" />
                  </svg>
                </button>
                <input id="chat-text" placeholder="Mensagem" />
                <label class="icon-btn" for="chat-media" title="Anexar">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.44 11.05l-8.49 8.49a6 6 0 01-8.49-8.49l8.49-8.49a4 4 0 015.66 5.66l-8.49 8.49a2 2 0 01-2.83-2.83l7.78-7.78" />
                  </svg>
                </label>
                <label class="icon-btn" for="chat-media" title="Camera">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h3l2-2h8l2 2h3a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                  </svg>
                </label>
                <input id="chat-media" type="file" accept="image/*,video/*" hidden />
                <button id="rec-start" class="mic-btn" type="button" title="Gravar audio">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V4a3 3 0 0 1 3-3z"/>
                    <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
                    <path d="M12 19v4"/>
                    <path d="M8 23h8"/>
                  </svg>
                </button>
                <button id="chat-send" class="send-btn" type="button">Enviar</button>
              </div>
              <div id="emoji-panel" class="emoji-panel hidden">
                <button class="emoji" type="button">😀</button><button class="emoji" type="button">😂</button><button class="emoji" type="button">😍</button><button class="emoji" type="button">😎</button>
                <button class="emoji" type="button">😅</button><button class="emoji" type="button">🥺</button><button class="emoji" type="button">😤</button><button class="emoji" type="button">😭</button>
                <button class="emoji" type="button">👍</button><button class="emoji" type="button">🙏</button><button class="emoji" type="button">🔥</button><button class="emoji" type="button">💡</button>
              </div>
              <div id="upload-status" class="muted"></div>
              <div id="record-bar" class="record-bar hidden">
                <button id="rec-cancel" class="icon-btn danger" type="button" title="Cancelar">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18"/>
                    <path d="M8 6V4h8v2"/>
                    <path d="M8 6l1 14h6l1-14"/>
                  </svg>
                </button>
                <div class="record-wave">
                  <span id="audio-time">00:00</span>
                  <canvas id="audio-wave" width="320" height="46"></canvas>
                </div>
                <button id="rec-pause" class="icon-btn" type="button" title="Pausar">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
                  </svg>
                </button>
                <button id="rec-send" class="mic-send" type="button" title="Enviar audio">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13"/>
                    <path d="M22 2l-7 20-4-9-9-4 20-7z"/>
                  </svg>
                </button>
              </div>
            </div>
          </section>
        </div>
      </section>

      <section id="tab-admin" class="tab-panel">
        <div class="admin-shell">
          <div class="admin-card">
            <h3>Usuarios ativos</h3>
            <button id="admin-refresh" class="btn-ghost" type="button">Atualizar</button>
            <pre id="admin-users" class="output"></pre>
          </div>
          <div class="admin-card">
            <h3>Banir / Desbanir</h3>
            <label for="ban-type">Tipo</label>
            <select id="ban-type">
              <option value="username">Usuario</option>
              <option value="ip">IP</option>
            </select>
            <label for="ban-value">Valor</label>
            <input id="ban-value" placeholder="usuario ou IP" />
            <label for="ban-reason">Motivo</label>
            <input id="ban-reason" placeholder="motivo" />
            <div class="admin-actions">
              <button id="ban-btn" class="btn-primary" type="button">Banir</button>
              <button id="unban-btn" class="btn-ghost" type="button">Desbanir</button>
            </div>
            <pre id="admin-bans" class="output"></pre>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="/static/app.js?v=20260313i"></script>
</body>
</html>
