version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - '8080:8080'
    env_file:
      - ./backend/.env.example
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE_URL=http://backend:8080/api
    depends_on:
      - backend

  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  mongo_data:
